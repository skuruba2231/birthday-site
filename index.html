<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Ashlene 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#ff758c;
  color:#fff;
  text-align:center;
  overflow-x:hidden;
}

/* INTRO */
#intro{
 position:fixed;
 width:100%;
 height:100%;
 background:#000;
 display:flex;
 justify-content:center;
 align-items:center;
 flex-direction:column;
 z-index:10;
}

.intro-text{
 font-size:28px;
 opacity:0;
 animation:fadeText 3s forwards;
}

.intro-text:nth-child(2){animation-delay:2s}
.intro-text:nth-child(3){animation-delay:4s}

@keyframes fadeText{
 0%{opacity:0;transform:translateY(20px)}
 100%{opacity:1;transform:translateY(0)}
}

.hidden{display:none}

/* MAIN */
h1{margin-top:80px}

.btn{
 padding:12px 25px;
 border:none;
 border-radius:25px;
 background:#ff4081;
 color:#fff;
 cursor:pointer;
}

/* SLIDESHOW */
.slideshow{
 max-width:600px;
 margin:20px auto;
}
.slideshow img{
 width:100%;
 border-radius:20px;
}

/* POPUP */
.popup{
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 background:rgba(0,0,0,.9);
 display:flex;
 justify-content:center;
 align-items:center;
 visibility:hidden;
}

.popup-content{
 background:#fff;
 color:#000;
 padding:30px;
 border-radius:20px;
 max-width:350px;
}

.show{visibility:visible}

#typeMsg{
 font-size:18px;
 min-height:120px;
}

/* FADE TEXT */
.fade-line{
 position:fixed;
 bottom:30px;
 width:100%;
 text-align:center;
 font-size:20px;
 opacity:0;
 animation:fadeIn 4s forwards;
 animation-delay:5s;
}

@keyframes fadeIn{
 to{opacity:1}
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="intro-text">For someone special 💖</div>
  <div class="intro-text">A small surprise...</div>
  <div class="intro-text">Just for you Ashlene 🎂</div>
</div>

<!-- MAIN -->
<div id="main" class="hidden">
  <h1>🎂 Happy Birthday Ashlene 🎂</h1>
  <button class="btn" onclick="startExperience()">💖 Open Surprise</button>

  <div class="slideshow">
    <img id="slide" src="photo19.jpeg">
  </div>
</div>

<!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-content">
    <h2>💌</h2>
    <p id="typeMsg"></p>
    <button class="btn" onclick="closeMessage()">Close</button>
  </div>
</div>

<div class="fade-line">With 💖 for Ashlene</div>

<audio id="music" loop>
  <source src="Minnavle.mpeg" type="audio/mpeg">
</audio>

<script>
const music=document.getElementById("music");
const popup=document.getElementById("popup");

const msg=`Wishing you a very happy birthday Ashlene 🎂✨

      On your special day, I hope you're surrounded by love, happiness, and all the things that make you smile.
      
      You deserve the world and so much more. May this new year of your life bring you endless opportunities, 
      
      unforgettable memories, and dreams that come true💫❤️
      
      Thank you for being such a good person and thank you for listening and being there 💖
      
      I will always be grateful for this friendship🌸`;

const images=[
"photo1.jpeg","photo2.jpeg","photo3.jpeg","photo4.jpeg","photo5.jpeg","photo6.jpeg","photo7.jpeg","photo8.jpeg","photo9.jpeg","photo10.jpeg","photo11.jpeg","photo12.jpeg","photo13.jpeg","photo14.jpeg","photo15.jpeg",
"photo16.jpeg","photo17.jpeg","photo18.jpeg","photo19.jpeg","photo20.jpeg"
];

let i=0;
function slideShow(){
 document.getElementById("slide").src=images[i];
 i=(i+1)%images.length;
 setTimeout(slideShow,2500);
}

function typeWriter(text,el,i=0){
 if(i<text.length){
  el.innerHTML+=text.charAt(i);
  setTimeout(()=>typeWriter(text,el,i+1),80);
 }
}

function startExperience(){
 music.play().catch(()=>{});
 launchConfetti();
 slideShow();
 popup.classList.add("show");
 document.getElementById("typeMsg").innerHTML="";
 typeWriter(msg,document.getElementById("typeMsg"));
}

function closeMessage(){
 popup.classList.remove("show");
}

function launchConfetti(){
 confetti({particleCount:200,spread:120});
}

/* AUTO INTRO */
setTimeout(()=>{
 document.getElementById("intro").style.display="none";
 document.getElementById("main").classList.remove("hidden");
},6000);
</script>

</body>
</html>
