<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Ashlene 🎉</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      color: white;
      text-align: center;
    }

    header { padding: 60px 20px; }

    h1 { font-size: 3em; }

    .btn {
      padding: 12px 25px;
      margin: 10px;
      border: none;
      border-radius: 25px;
      background: #ff4081;
      color: white;
      cursor: pointer;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      padding: 30px;
    }

    .gallery img {
      width: 100%;
      border-radius: 15px;
      transition: 0.4s;
    }

    .gallery img:hover { transform: scale(1.1); }

    .popup {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      visibility: hidden;
    }

    .popup-content {
      background: white;
      color: black;
      padding: 30px;
      border-radius: 20px;
      max-width: 350px;
    }

    .show { visibility: visible; }

    footer { padding: 20px; }
  </style>
</head>
<body>

<header>
  <h1>🎂 Happy Birthday Ashlene 🎂</h1>
  <p>You are truly special 💖</p>

  <button class="btn" onclick="toggleMusic()">🎵 Music</button>
  <button class="btn" onclick="showMessage()">💌 Message</button>
  <button class="btn" onclick="launchConfetti()">🎇 Celebrate</button>
</header>

<section class="gallery">
  <!-- Replace these with your real photos -->
  <img src="https://picsum.photos/300/200?1">
  <img src="https://picsum.photos/300/200?2">
  <img src="https://picsum.photos/300/200?3">
  <img src="https://picsum.photos/300/200?4">
  <img src="https://picsum.photos/300/200?5">
  <img src="https://picsum.photos/300/200?6">
  <img src="https://picsum.photos/300/200?7">
  <img src="https://picsum.photos/300/200?8">
  <img src="https://picsum.photos/300/200?9">
  <img src="https://picsum.photos/300/200?10">
  <img src="https://picsum.photos/300/200?11">
  <img src="https://picsum.photos/300/200?12">
  <img src="https://picsum.photos/300/200?13">
  <img src="https://picsum.photos/300/200?14">
  <img src="https://picsum.photos/300/200?15">
  <img src="https://picsum.photos/300/200?16">
  <img src="https://picsum.photos/300/200?17">
  <img src="https://picsum.photos/300/200?18">
</section>

<div id="popup" class="popup">
  <div class="popup-content">
    <h2>💖 Special Message</h2>
    <p>
      Wishing you a very happy birthday Ashlene 🎂✨<br><br>
      Thank you for being such a good person and thank you for listening and being there 💖<br><br>
      I will always be grateful for this friendship 🌸
    </p>
    <button class="btn" onclick="closeMessage()">Close</button>
  </div>
</div>

<footer>
  Made with ❤️ for Ashlene
</footer>

<audio id="music" loop>
  <!-- Replace with your favorite Malayalam/Tamil song link -->
  <source src="https://www.bensound.com/bensound-music/bensound-love.mp3" type="audio/mpeg">
</audio>

<script>
  const music = document.getElementById("music");
  const popup = document.getElementById("popup");

  function toggleMusic() {
    if (music.paused) music.play();
    else music.pause();
  }

  function showMessage() {
    popup.classList.add("show");
  }

  function closeMessage() {
    popup.classList.remove("show");
  }

  function launchConfetti() {
    confetti({ particleCount: 200, spread: 120 });
  }
</script>

</body>
</html>
